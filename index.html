<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root{
      --orange:#F26739;
      --dark:#1f2937;
      --green:#16a34a;
      --red:#991b1b;
      --border:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:18px;
      font-family:Arial,'Noto Sans Thai',sans-serif;
      background:radial-gradient(circle at top,#fff1e8,#ffffff 52%);
      color:var(--dark);
    }
    .wrap{
      max-width:520px;
      margin:0 auto;
    }
    .header{
      background:linear-gradient(135deg,var(--orange),#ff9a6b);
      color:#fff;
      padding:24px 20px;
      border-radius:28px;
      text-align:center;
      box-shadow:0 18px 45px rgba(242,103,57,.25);
      margin-bottom:16px;
    }
    .header h1{
      margin:0;
      font-size:28px;
      font-weight:900;
    }
    .header p{
      margin:8px 0 0;
      font-size:15px;
      font-weight:800;
      opacity:.95;
    }
    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:26px;
      padding:20px;
      box-shadow:0 12px 32px rgba(0,0,0,.08);
      margin-bottom:14px;
    }
    button{
      width:100%;
      border:0;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
      margin-top:10px;
    }
    .primary{
      background:var(--orange);
      color:#fff;
      box-shadow:0 10px 25px rgba(242,103,57,.25);
    }
    .secondary{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    #reader{
      overflow:hidden;
      border-radius:22px;
      margin-top:14px;
      display:none;
    }
    #reader.active{
      display:block;
    }
    .result{
      display:none;
      margin-top:14px;
      padding:14px;
      border-radius:18px;
      font-weight:900;
      text-align:center;
      line-height:1.55;
    }
    .ok{
      display:block;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .bad{
      display:block;
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    /* ================= MODAL STATUS ================= */
    .modal-overlay{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:
        radial-gradient(circle at 50% 20%, rgba(242,103,57,.28), transparent 34%),
        rgba(17,24,39,.62);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .modal-overlay.show{
      display:flex;
    }
    .status-modal{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg,#ffffff,#fff8f2);
      border:1px solid #fed7aa;
      border-radius:32px;
      padding:28px 24px;
      text-align:center;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
      animation:modalPop .28s cubic-bezier(.22,1.25,.36,1);
      overflow:hidden;
      position:relative;
    }
    .status-modal::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:8px;
      background:linear-gradient(90deg,#F26739,#ff9a6b,#F26739);
    }
    .modal-icon{
      width:82px;
      height:82px;
      margin:4px auto 16px;
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:42px;
      background:linear-gradient(135deg,#F26739,#ff9a6b);
      color:white;
      box-shadow:0 16px 30px rgba(242,103,57,.26);
      animation:iconBreath 1.6s ease-in-out infinite;
    }
    .modal-icon.success{
      background:linear-gradient(135deg,#16a34a,#22c55e);
      box-shadow:0 16px 30px rgba(22,163,74,.24);
    }
    .modal-icon.error{
      background:linear-gradient(135deg,#dc2626,#ef4444);
      box-shadow:0 16px 30px rgba(220,38,38,.24);
    }
    .status-modal h2{
      margin:0;
      font-size:26px;
      font-weight:900;
      color:#1f2937;
    }
    .status-modal p{
      margin:10px 0 0;
      color:#6b7280;
      font-size:16px;
      font-weight:800;
      line-height:1.6;
    }
    .modal-loader{
      width:100%;
      height:10px;
      margin-top:22px;
      border-radius:999px;
      background:#ffedd5;
      overflow:hidden;
    }
    .modal-loader span{
      display:block;
      width:42%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#F26739,#ffb088);
      animation:loadingMove 1s ease-in-out infinite;
    }
    .modal-close-btn{
      display:none;
      margin-top:18px;
      background:#F26739;
      color:white;
      box-shadow:0 10px 22px rgba(242,103,57,.22);
    }
    .modal-close-btn.show{
      display:block;
    }
    @keyframes modalPop{
      from{ opacity:0; transform:translateY(14px) scale(.94); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes iconBreath{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.06); }
    }
    @keyframes loadingMove{
      0%{ transform:translateX(-120%); }
      100%{ transform:translateX(260%); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>📷 สแกน QR เช็คชื่อ</h1>
      <p>ข้าวขาหมูอิสรภาพ Team Center</p>
    </div>

    <div class="card">
      <button class="primary" onclick="startScanner()" style="display:none;">
        เปิดกล้องสแกน QR
      </button>

      <button class="secondary" onclick="stopScanner()">ปิดกล้อง</button>

      <div id="reader"></div>
      <div id="result" class="result"></div>
    </div>
  </div>

  <div id="statusOverlay" class="modal-overlay">
    <div class="status-modal">
      <div id="modalIcon" class="modal-icon">⏳</div>
      <h2 id="modalTitle">กำลังบันทึก</h2>
      <p id="modalMessage">ระบบกำลังบันทึกเวลาเข้างาน กรุณารอสักครู่</p>
      <div id="modalLoader" class="modal-loader"><span></span></div>
      <button id="modalCloseBtn" class="modal-close-btn" onclick="closeThisWindow()">ปิดหน้าต่างนี้</button>
    </div>
  </div>

<script>
  let scanner = null;
  let scanning = false;

  const params = new URLSearchParams(window.location.search);

  const apiUrl = params.get('api') || '';
  const backUrl = params.get('back') || '';

  function showResult(message, isError){
    const box = document.getElementById('result');
    box.className = 'result ' + (isError ? 'bad' : 'ok');
    box.innerHTML = message;
  }

  function showStatusModal(type, title, message, showCloseButton){
    const overlay = document.getElementById('statusOverlay');
    const icon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const loader = document.getElementById('modalLoader');
    const closeBtn = document.getElementById('modalCloseBtn');

    icon.className = 'modal-icon';
    if (type === 'success') {
      icon.classList.add('success');
      icon.innerHTML = '✅';
      loader.style.display = 'none';
    } else if (type === 'error') {
      icon.classList.add('error');
      icon.innerHTML = '⚠️';
      loader.style.display = 'none';
    } else {
      icon.innerHTML = '⏳';
      loader.style.display = 'block';
    }

    modalTitle.innerHTML = title || '';
    modalMessage.innerHTML = message || '';
    closeBtn.className = showCloseButton ? 'modal-close-btn show' : 'modal-close-btn';
    overlay.classList.add('show');
  }

  function closeThisWindow(){
    window.close();

    setTimeout(function(){
      if (backUrl) {
        window.location.href = backUrl;
      }
    }, 300);
  }

  function cleanQRText(text){
    let raw = String(text || '').trim();
    if (!raw) return '';

    try {
      const url = new URL(raw);
      return (
        url.searchParams.get('emp') ||
        url.searchParams.get('employeeId') ||
        url.searchParams.get('id') ||
        raw
      ).trim();
    } catch(e) {
      return raw;
    }
  }

  function submitCheckin(rawText){
    const employeeId = cleanQRText(rawText);

    if (!employeeId) {
      showStatusModal('error', 'QR ไม่ถูกต้อง', 'กรุณาลองสแกนใหม่อีกครั้ง', true);
      return;
    }

    if (!apiUrl) {
      showStatusModal('error', 'ไม่พบ API URL', 'ไม่สามารถเชื่อมต่อระบบบันทึกเวลาได้', true);
      return;
    }

    showStatusModal('loading', 'สแกนสำเร็จ', 'กำลังบันทึกเวลาเข้างาน...', false);

    const target = apiUrl
      + '?action=checkin'
      + '&id=' + encodeURIComponent(employeeId)
      + '&close=1'
      + (backUrl ? '&back=' + encodeURIComponent(backUrl) : '');

    setTimeout(function(){
      window.location.href = target;
    }, 900);
  }

  function startScanner(){
    const reader = document.getElementById('reader');

    if (!window.Html5Qrcode) {
      showStatusModal('error', 'โหลดระบบสแกนไม่สำเร็จ', 'กรุณาเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่', true);
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showStatusModal('error', 'อุปกรณ์ไม่รองรับกล้อง', 'กรุณาเปิดด้วย Chrome หรือ Safari', true);
      return;
    }

    if (scanning) return;

    reader.classList.add('active');
    showResult('กำลังเปิดกล้อง...', false);

    scanner = scanner || new Html5Qrcode('reader');
    scanning = true;

    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      function(decodedText){
        stopScanner(true);
        submitCheckin(decodedText);
      }
    ).catch(function(err){
      scanning = false;
      reader.classList.remove('active');
      showStatusModal('error', 'เปิดกล้องไม่ได้', 'กรุณาอนุญาตกล้อง หรือเปิดด้วย Chrome/Safari', true);
    });
  }

  function stopScanner(keepBox){
    const reader = document.getElementById('reader');

    if (scanner && scanning) {
      scanner.stop()
        .then(function(){
          scanning = false;
          if (!keepBox) reader.classList.remove('active');
        })
        .catch(function(){
          scanning = false;
          if (!keepBox) reader.classList.remove('active');
        });
    } else {
      scanning = false;
      if (!keepBox) reader.classList.remove('active');
    }
  }

  window.onload = function(){
    if (!apiUrl) {
      return;
    }

    setTimeout(function(){
      startScanner();
    }, 500);
  };
</script>
</body>
</html>
