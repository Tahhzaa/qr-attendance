<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root{
      --orange:#F26739;
      --dark:#1f2937;
      --green:#16a34a;
      --red:#991b1b;
      --border:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:18px;
      font-family:Arial,'Noto Sans Thai',sans-serif;
      background:radial-gradient(circle at top,#fff1e8,#ffffff 52%);
      color:var(--dark);
    }
    .wrap{max-width:520px;margin:0 auto;}
    .header{
      background:linear-gradient(135deg,var(--orange),#ff9a6b);
      color:#fff;
      padding:24px 20px;
      border-radius:28px;
      text-align:center;
      box-shadow:0 18px 45px rgba(242,103,57,.25);
      margin-bottom:16px;
    }
    .header h1{margin:0;font-size:28px;font-weight:900;}
    .header p{margin:8px 0 0;font-size:15px;font-weight:800;opacity:.95;}
    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:26px;
      padding:20px;
      box-shadow:0 12px 32px rgba(0,0,0,.08);
      margin-bottom:14px;
    }
    button{
      width:100%;
      border:0;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
      margin-top:10px;
    }
    .secondary{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    #reader{
      overflow:hidden;
      border-radius:22px;
      margin-top:14px;
      display:none;
    }
    #reader.active{display:block;}
    .result{
      display:none;
      margin-top:14px;
      padding:14px;
      border-radius:18px;
      font-weight:900;
      text-align:center;
      line-height:1.55;
    }
    .ok{
      display:block;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .bad{
      display:block;
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      z-index:9999;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:
        radial-gradient(circle at 50% 20%, rgba(242,103,57,.28), transparent 34%),
        rgba(17,24,39,.62);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .modal-overlay.show{display:flex;}
    .status-modal{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg,#ffffff,#fff8f2);
      border:1px solid #fed7aa;
      border-radius:32px;
      padding:28px 24px;
      text-align:center;
      box-shadow:0 30px 80px rgba(0,0,0,.28);
      animation:modalPop .28s cubic-bezier(.22,1.25,.36,1);
      overflow:hidden;
      position:relative;
    }
    .status-modal::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:8px;
      background:linear-gradient(90deg,#F26739,#ff9a6b,#F26739);
    }
    .modal-icon{
      width:82px;
      height:82px;
      margin:4px auto 16px;
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:42px;
      background:linear-gradient(135deg,#16a34a,#22c55e);
      color:white;
      box-shadow:0 16px 30px rgba(22,163,74,.24);
      animation:iconBreath 1.6s ease-in-out infinite;
    }
    .status-modal h2{
      margin:0;
      font-size:26px;
      font-weight:900;
      color:#1f2937;
    }
    .status-modal p{
      margin:10px 0 0;
      color:#6b7280;
      font-size:16px;
      font-weight:800;
      line-height:1.6;
    }
    @keyframes modalPop{
      from{ opacity:0; transform:translateY(14px) scale(.94); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes iconBreath{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.06); }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>📷 สแกน QR เช็คชื่อ</h1>
      <p>ข้าวขาหมูอิสรภาพ Team Center</p>
    </div>

    <div class="card">
      <button class="secondary" onclick="stopScanner()">ปิดกล้อง</button>
      <div id="reader"></div>
      <div id="result" class="result"></div>
    </div>
  </div>

  <div id="statusOverlay" class="modal-overlay">
    <div class="status-modal">
      <div class="modal-icon">✅</div>
      <h2>สแกนสำเร็จ</h2>
      <p>กำลังบันทึกเวลาเข้างาน<br>ระบบจะปิดหน้านี้อัตโนมัติ</p>
    </div>
  </div>

<script>
  let scanner = null;
  let scanning = false;
  let submitted = false;

  const params = new URLSearchParams(window.location.search);
  const apiUrl = params.get('api') || '';

  function showResult(message, isError){
    const box = document.getElementById('result');
    box.className = 'result ' + (isError ? 'bad' : 'ok');
    box.innerHTML = message;
  }

  function showSuccessModal(){
    document.getElementById('statusOverlay').classList.add('show');
  }

  function forceCloseTab(){
    window.open('', '_self');
    window.close();

    setTimeout(function(){
      document.body.innerHTML = '';
    }, 800);
  }

  function cleanQRText(text){
    let raw = String(text || '').trim();
    if (!raw) return '';

    try {
      const url = new URL(raw);
      return (
        url.searchParams.get('emp') ||
        url.searchParams.get('employeeId') ||
        url.searchParams.get('id') ||
        raw
      ).trim();
    } catch(e) {
      return raw;
    }
  }

  function submitCheckin(rawText){
    if (submitted) return;
    submitted = true;

    const employeeId = cleanQRText(rawText);

    if (!employeeId) {
      showResult('QR ไม่ถูกต้อง', true);
      submitted = false;
      return;
    }

    if (!apiUrl) {
      showResult('ไม่พบ API URL', true);
      submitted = false;
      return;
    }

    showSuccessModal();

    const target = apiUrl
      + '?action=checkin'
      + '&id=' + encodeURIComponent(employeeId)
      + '&silent=1';

    // ส่งข้อมูลแบบไม่เปลี่ยนหน้า เพื่อไม่ให้เห็นหน้า Apps Script
    fetch(target, {
      method: 'GET',
      mode: 'no-cors',
      keepalive: true
    }).catch(function(){});

    // เผื่อบาง browser ส่ง keepalive ไม่ทัน
    const img = new Image();
    img.src = target + '&t=' + Date.now();

    setTimeout(function(){
      forceCloseTab();
    }, 900);
  }

  function startScanner(){
    const reader = document.getElementById('reader');

    if (!window.Html5Qrcode) {
      showResult('โหลดระบบสแกน QR ไม่สำเร็จ', true);
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showResult('อุปกรณ์นี้ไม่รองรับการเปิดกล้อง', true);
      return;
    }

    if (scanning) return;

    reader.classList.add('active');
    showResult('กำลังเปิดกล้อง...', false);

    scanner = scanner || new Html5Qrcode('reader');
    scanning = true;

    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      function(decodedText){
        stopScanner(true);
        submitCheckin(decodedText);
      }
    ).catch(function(){
      scanning = false;
      reader.classList.remove('active');
      showResult('เปิดกล้องไม่ได้ กรุณาอนุญาตกล้อง หรือเปิดด้วย Chrome/Safari', true);
    });
  }

  function stopScanner(keepBox){
    const reader = document.getElementById('reader');

    if (scanner && scanning) {
      scanner.stop()
        .then(function(){
          scanning = false;
          if (!keepBox) reader.classList.remove('active');
        })
        .catch(function(){
          scanning = false;
          if (!keepBox) reader.classList.remove('active');
        });
    } else {
      scanning = false;
      if (!keepBox) reader.classList.remove('active');
    }
  }

  window.onload = function(){
    if (!apiUrl) return;

    setTimeout(function(){
      startScanner();
    }, 500);
  };
</script>
</body>
</html>
