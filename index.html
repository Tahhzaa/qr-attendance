<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root{
      --orange:#F26739;
      --dark:#1f2937;
      --green:#16a34a;
      --red:#991b1b;
      --border:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:18px;
      font-family:Arial,'Noto Sans Thai',sans-serif;
      background:radial-gradient(circle at top,#fff1e8,#ffffff 52%);
      color:var(--dark);
    }
    .wrap{
      max-width:520px;
      margin:0 auto;
    }
    .header{
      background:linear-gradient(135deg,var(--orange),#ff9a6b);
      color:#fff;
      padding:24px 20px;
      border-radius:28px;
      text-align:center;
      box-shadow:0 18px 45px rgba(242,103,57,.25);
      margin-bottom:16px;
    }
    .header h1{
      margin:0;
      font-size:28px;
      font-weight:900;
    }
    .header p{
      margin:8px 0 0;
      font-size:15px;
      font-weight:800;
      opacity:.95;
    }
    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:26px;
      padding:20px;
      box-shadow:0 12px 32px rgba(0,0,0,.08);
      margin-bottom:14px;
    }
    button{
      width:100%;
      border:0;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
      margin-top:10px;
    }
    .primary{
      background:var(--orange);
      color:#fff;
      box-shadow:0 10px 25px rgba(242,103,57,.25);
    }
    .secondary{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
    }
    #reader{
      overflow:hidden;
      border-radius:22px;
      margin-top:14px;
      display:none;
    }
    #reader.active{
      display:block;
    }
    .result{
      display:none;
      margin-top:14px;
      padding:14px;
      border-radius:18px;
      font-weight:900;
      text-align:center;
      line-height:1.55;
    }
    .ok{
      display:block;
      background:#ecfdf5;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .bad{
      display:block;
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>📷 สแกน QR เช็คชื่อ</h1>
      <p>ข้าวขาหมูอิสรภาพ Team Center</p>
    </div>

    <div class="card">
      <button class="primary" onclick="startScanner()" style="display:none;">
        เปิดกล้องสแกน QR
      </button>

      <button class="secondary" onclick="stopScanner()">ปิดกล้อง</button>

      <div id="reader"></div>
      <div id="result" class="result"></div>
    </div>
  </div>

<script>
  let scanner = null;
  let scanning = false;

  const params = new URLSearchParams(window.location.search);

  const apiUrl = params.get('api') || '';
  const backUrl = params.get('back') || '';

  function showResult(message, isError){
    const box = document.getElementById('result');
    box.className = 'result ' + (isError ? 'bad' : 'ok');
    box.innerHTML = message;
  }

  function cleanQRText(text){
    let raw = String(text || '').trim();
    if (!raw) return '';

    try {
      const url = new URL(raw);
      return (
        url.searchParams.get('emp') ||
        url.searchParams.get('employeeId') ||
        url.searchParams.get('id') ||
        raw
      ).trim();
    } catch(e) {
      return raw;
    }
  }

  function submitCheckin(rawText){
    const employeeId = cleanQRText(rawText);
    if (!employeeId) {
      showResult('QR ไม่ถูกต้อง', true);
      return;
    }

    if (!apiUrl) {
      showResult('ไม่พบ API URL', true);
      return;
    }

    showResult('สแกนสำเร็จ กำลังบันทึก...', false);

    const target = apiUrl
      + '?action=checkin'
      + '&id=' + encodeURIComponent(employeeId)
      + (backUrl ? '&back=' + encodeURIComponent(backUrl) : '');

    window.location.href = target;
  }

  function startScanner(){
    const reader = document.getElementById('reader');

    if (!window.Html5Qrcode) {
      showResult('โหลดระบบสแกน QR ไม่สำเร็จ', true);
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showResult('อุปกรณ์นี้ไม่รองรับการเปิดกล้อง', true);
      return;
    }

    if (scanning) return;

    reader.classList.add('active');
    showResult('กำลังเปิดกล้อง...', false);

    scanner = scanner || new Html5Qrcode('reader');
    scanning = true;

    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      function(decodedText){
        stopScanner(true);
        submitCheckin(decodedText);
      }
    ).catch(function(err){
      scanning = false;
      reader.classList.remove('active');
      showResult('เปิดกล้องไม่ได้ กรุณาอนุญาตกล้อง หรือเปิดด้วย Chrome/Safari', true);
    });
  }

  function stopScanner(keepBox){
    const reader = document.getElementById('reader');

    if (scanner && scanning) {
      scanner.stop()
        .then(function(){
          scanning = false;
          if (!keepBox) reader.classList.remove('active');
        })
        .catch(function(){
          scanning = false;
          if (!keepBox) reader.classList.remove('active');
        });
    } else {
      scanning = false;
      if (!keepBox) reader.classList.remove('active');
    }
  }

  window.onload = function(){
    if (!apiUrl) {
      return;
    }

    setTimeout(function(){
      startScanner();
    }, 500);
  };
</script>
</body>
</html>
