<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attendance</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

button{
background:#F26739;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

#reader{
margin-top:20px;
}

.success{
background:#dcfce7;
color:#166534;
padding:12px;
margin-top:15px;
border-radius:10px;
display:none;
}

.error{
background:#fee2e2;
color:#991b1b;
padding:12px;
margin-top:15px;
border-radius:10px;
display:none;
}
</style>

</head>

<body>

<div class="container">

<h1>เช็คชื่อพนักงาน</h1>

<p>สแกน QR Code พนักงาน</p>

<button onclick="startScanner()">
เปิดกล้อง
</button>

<div id="reader"></div>

<div id="success" class="success"></div>
<div id="error" class="error"></div>

</div>

<script>

let scanner;

function startScanner(){

scanner = new Html5Qrcode("reader");

scanner.start(
{
facingMode:"environment"
},
{
fps:10,
qrbox:250
},
onScanSuccess
).catch(err=>{
showError(err);
});

}

function onScanSuccess(qrCodeMessage){

scanner.stop();

document.getElementById("success").style.display="block";
document.getElementById("success").innerHTML=
"เช็คชื่อสำเร็จ : " + qrCodeMessage;

/*
ส่งข้อมูลเข้า Apps Script

fetch("YOUR_WEBAPP_URL",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
employeeId:qrCodeMessage
})
})
*/

}

function showError(msg){
document.getElementById("error").style.display="block";
document.getElementById("error").innerHTML=msg;
}

</script>

</body>
</html>
